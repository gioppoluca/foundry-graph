<form>
    <div class="relations-list">
        {{#each relations as |relation|}}
        <div class="relation-row" data-relation-id="{{relation.id}}">
            <fieldset>
                <legend>
                    <span>{{relation.label}}</span>
                    <button type="button" class="icon fa-solid fa-trash" data-tooltip="foundry-graph.tooltip.deleteRelation"
                        data-action="delete" data-id="{{relation.id}}"></button>
                </legend>

                <div class="form-group">
                    <label>{{localize "foundry-graph.Labels.ID"}}</label>
                    <input type="text" name="id" value="{{relation.id}}"
                        placeholder="{{localize 'foundry-graph.Relations.IdPlaceholder'}}" required readonly>
                </div>

                <div class="form-group">
                    <label>{{localize "foundry-graph.Labels.Label"}}</label>
                    <input type="text" name="label" value="{{relation.label}}" placeholder="{{localize 'foundry-graph.Relations.LabelPlaceholder'}}">
                </div>

                <div class="form-group slim">
                    <label>{{localize "foundry-graph.Labels.Color"}}</label>
                    <input type="color" name="color" value="{{relation.color}}">
                </div>

                <div class="form-group slim">
                    <label>{{localize "foundry-graph.Labels.Style"}}</label>
                    <select name="style">
                        {{#each ../styleOptions as |styleOpt|}}
                        <option value="{{styleOpt.id}}" {{#if (eq styleOpt.id relation.style)}}selected{{/if}}>
                            {{styleOpt.label}}
                        </option>
                        {{/each}}
                    </select>
                </div>

                <div class="form-group slim">
                    <label>{{localize "foundry-graph.Labels.Width"}}</label>
                    <input type="number" name="strokeWidth" value="{{relation.strokeWidth}}" min="1" max="10" step="0.5">
                </div>

                <div class="form-group slim">
                    <label>{{localize "foundry-graph.Labels.NoArrow"}}</label>
                    <input type="checkbox" name="noArrow" {{#if relation.noArrow}}checked{{/if}}>
                </div>

                <div class="form-group slim">
                    <label>{{localize "foundry-graph.Labels.Glow"}}</label>
                    <input type="checkbox" name="glow" {{#if relation.glow}}checked{{/if}}>
                </div>

            </fieldset>
        </div>
        {{/each}}
    </div>
</form>
