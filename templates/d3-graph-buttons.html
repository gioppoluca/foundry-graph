<div class="graph-controls">
  <i class="fas fa-info-circle help-icon" data-tooltip="{{instructions}}" data-tooltip-direction="UP">
  </i>
  <div class="flexrow">
    {{#if isLinkNodesVisible}}
    <button type="button" data-action="linkNodes" class="graph-btn">{{localize "foundry-graph.Buttons.LinkNodes"}}</button>
    {{/if}}
    {{#if isRelationSelectVisible}}
    <label for="relation-type">{{localize "foundry-graph.Labels.RelationTypeWithColon"}}</label>
    <select id="relation-type">
      {{#each relations}}
      <option value="{{id}}" data-color="{{color}}" data-style="{{style}}">
        {{label}}
      </option>
      {{/each}}
    </select>
    {{/if}}
  </div>
  <div class="flexrow">
    <button data-action="exportAction" id="export-btn">🖼 {{localize "foundry-graph.Buttons.ExportSvg"}}</button>
    {{#if isSaveNewSceneVisible}}
    <button data-action="exportSceneAction" id="export-scene-btn">🖼 {{localize "foundry-graph.Buttons.ExportScene"}}</button>
    {{/if}}
    {{#if isSaveNewSceneScaledVisible}}
    <button data-action="exportScaledSceneAction" id="export-scaled-scene-btn" {{#unless isSaveNewSceneScaledEnabled}}disabled
      title="{{localize 'foundry-graph.Notifications.ScaledSceneExportUnavailableZoom'}}"{{/unless}}>🗺 {{localize "foundry-graph.Buttons.ExportScaledScene"}}</button>
    {{/if}}
    <button data-action="saveAction" id="save-btn" {{#unless isEdit}}disabled
      title='{{localize "foundry-graph.Window.ViewOnlyMode"}}' {{/unless}}>💾 {{localize
      "foundry-graph.Buttons.Save"}}</button>
  </div>
</div>
